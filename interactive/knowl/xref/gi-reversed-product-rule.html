<div class="para">A reversed product rule recognizes a sum in the form</div>
<div class="displaymath process-math">
\begin{equation*}
f(x)g'(x)+f'(x)g(x)
\end{equation*}
</div>
<div class="para">as the derivative <span class="process-math">\(\frac{d}{dx}[f(x)g(x)]\text{.}\)</span> For example,</div>
<div class="displaymath process-math">
\begin{equation*}
e^{2x}y' + 2e^{2x}y = \frac{d}{dx}[e^{2x}y]\text{.}
\end{equation*}
</div>
