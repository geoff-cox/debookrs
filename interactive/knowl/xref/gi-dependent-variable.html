<div class="para">The dependent variable is the unknown function being solved for in a <a href="glossary-main.html#gi-differential-equation" class="xref" data-knowl="./knowl/xref/gi-differential-equation.html" data-reveal-label="Reveal" data-close-label="Close" title="Term: differential equation (DE)">DE</a>. It is the variable with derivatives applied to it.</div>
<div class="displaymath process-math" data-contains-math-knowls="./knowl/xref/gi-differential-equation.html">
\begin{equation*}
-2\frac{d{\DLO y}}{dt} + 4t{\DLO\underline{y}} = t^2 \quad\text{dependent variable:}\ {\DLO\underline{y}}
\end{equation*}
</div>
