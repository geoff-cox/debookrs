<div class="para">A constant solution of an <a href="glossary-main.html#gi-autonomous-differential-equation" class="xref" data-knowl="./knowl/xref/gi-autonomous-differential-equation.html" data-reveal-label="Reveal" data-close-label="Close" title="Term: autonomous differential equation">autonomous differential equation</a>. For a constant solution <span class="process-math">\(y=c\)</span> of</div>
<div class="displaymath process-math" data-contains-math-knowls="./knowl/xref/gi-autonomous-differential-equation.html">
\begin{gather*}
\frac{dy}{dt} = f(y)
\end{gather*}
</div>
<div class="para">we must have</div>
<div class="displaymath process-math" data-contains-math-knowls="./knowl/xref/gi-autonomous-differential-equation.html">
\begin{gather*}
0 = f(c)
\end{gather*}
</div>
<div class="para">so every value <span class="process-math">\(c\)</span> with <span class="process-math">\(f(c)=0\)</span> gives an equilibrium solution <span class="process-math">\(y(t)=c\text{.}\)</span>
</div>
